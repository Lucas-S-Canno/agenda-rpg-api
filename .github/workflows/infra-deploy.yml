name: Production Lifecycle (Nave-Mãe)

on:
    workflow_run:
        workflows: ["CI Pipeline"]
        branches: [main]
        types: [completed]
    pull_request:
        paths:
            - "terraform/**"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    plan:
        name: Tofu Plan
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        defaults:
            run:
                working-directory: terraform
        env:
            TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
            TF_VAR_neon_org_id: ${{ secrets.NEON_ORG_ID }}
            TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
            TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
            TF_VAR_upstash_api_key: ${{ secrets.UPSTASH_API_KEY }}
            TF_VAR_upstash_email: ${{ secrets.UPSTASH_EMAIL }}
            TF_VAR_render_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
            TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
            # R2 keys needed for the S3-compatible backend
            R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
              with:
                  tofu_version: latest

            - name: Tofu Init
              run: |
                  tofu init \
                    -backend-config="endpoint=https://${TF_VAR_cloudflare_account_id:-dummy}.r2.cloudflarestorage.com" \
                    -backend-config="access_key=${R2_ACCESS_KEY:-dummy}" \
                    -backend-config="secret_key=${R2_SECRET_KEY:-dummy}"

            - name: Tofu Plan
              id: plan
              run: tofu plan -no-color
              continue-on-error: true

            - name: Plan Output
              if: steps.plan.outcome == 'failure'
              run: exit 1

    apply:
        name: Tofu Apply (Infra Check)
        runs-on: ubuntu-latest
        if: |
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
            github.event_name == 'workflow_dispatch'
        defaults:
            run:
                working-directory: terraform
        env:
            TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            TF_VAR_neon_api_key: ${{ secrets.NEON_API_KEY }}
            TF_VAR_neon_org_id: ${{ secrets.NEON_ORG_ID }}
            TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
            TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
            TF_VAR_render_redis_connection_string: ${{ secrets.RENDER_REDIS_CONNECTION_STRING }}
            TF_VAR_render_database_url: ${{ secrets.RENDER_DATABASE_URL }}
            TF_VAR_upstash_api_key: ${{ secrets.UPSTASH_API_KEY }}
            TF_VAR_upstash_email: ${{ secrets.UPSTASH_EMAIL }}
            TF_VAR_render_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
            TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
            # R2 keys needed for the S3-compatible backend
            R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
              with:
                  tofu_version: latest

            - name: Tofu Init
              run: |
                  tofu init \
                    -backend-config="endpoint=https://${TF_VAR_cloudflare_account_id:-dummy}.r2.cloudflarestorage.com" \
                    -backend-config="access_key=${R2_ACCESS_KEY:-dummy}" \
                    -backend-config="secret_key=${R2_SECRET_KEY:-dummy}"

            - name: Tofu Apply
              run: tofu apply -auto-approve

    migrate:
        name: Database Migration (Flyway)
        needs: apply
        runs-on: ubuntu-latest
        if: |
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
            github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Java
              uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.2.2
              with:
                  java-version: '25'
                  distribution: 'zulu'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.3.0

            - name: Run Flyway Migration
              run: ./gradlew flywayMigrate
              env:
                  # This depends on the Flyway Gradle plugin configuration
                  FLYWAY_URL: ${{ secrets.RENDER_DATABASE_URL }}

    deploy:
        name: Trigger Render Deploy
        needs: migrate
        runs-on: ubuntu-latest
        environment:
            name: production
            url: test.test
        if: |
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
            github.event_name == 'workflow_dispatch'
        env:
            RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        steps:
            - name: Trigger Render Hook
              if: env.RENDER_DEPLOY_HOOK_URL != ''
              run: curl -fsX POST "${RENDER_DEPLOY_HOOK_URL}"
