## Spring Configuration
spring.application.name=api
server.servlet.context-path=/api

## Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenda-rpg}
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

## secrets
jwt.secret=${JWT_SECRET:secretaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}

## email sender configuration (Resend)
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:}
url.to-use-in-email=${URL_IN_EMAIL:localhost:4200}

## Registration verification configuration
registration.verification.ttl-minutes=60
registration.verification.code-length=6
registration.verification.max-attempts=5
registration.verification.resend-cooldown-minutes=2
registration.verification.daily-resend-limit=10

## Email verification configuration
app.email-verification.ttl-minutes=60
app.email-verification.resend-cooldown-minutes=5
app.email-verification.daily-resend-limit=5
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

## Flyway configuration - disable validation temporarily to fix migration issues
spring.flyway.validate-on-migrate=false

## Observabilidade (Actuator e Micrometer OTLP)
# Expor os endpoints do Actuator (necessário para health checks e métricas base)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Configuração do Micrometer para exportar as MÉTRICAS para o Collector OTLP
# O Agente Java exportará os Traces e Logs usando a ENV OTEL_EXPORTER_OTLP_ENDPOINT
# Mas o Micrometer (que roda dentro do Spring) precisa saber para onde mandar as métricas.
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:https://otlp-gateway-prod-sa-east-1.grafana.net/otlp/v1/metrics}
management.otlp.metrics.export.step=30s
# O Grafana exige autenticação. Como o Spring não lê automaticamente o OTEL_EXPORTER_OTLP_HEADERS,
# precisamos repassar o token do Grafana para o Micrometer usando uma ENV específica.
management.otlp.metrics.export.headers.Authorization=${GRAFANA_AUTH_HEADER:}

## Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
