# file: 'docker-compose.yml'
services:
  postgres:
    image: postgres:18
    container_name: agenda_rpg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenda_rpg}
      POSTGRES_USER: ${POSTGRES_USER:-agenda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenda}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agenda} -d ${POSTGRES_DB:-agenda_rpg}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: agenda_rpg_mail
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025" # Web UI

  api:
    build: .
    container_name: agenda_rpg_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agenda_rpg}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-agenda}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-agenda}
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME: ${MAIL_USER:-agenda}
      SPRING_MAIL_PASSWORD: ${MAIL_PASS:-agenda}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

# Comandos (PowerShell) para subir/gerenciar o ambiente:
# Subir tudo (incluindo a API) em segundo plano
#   docker compose up -d --build
# Ver status/health
#   docker compose ps
# Logs da API (em tempo real)
#   docker compose logs -f api
# Logs do Banco
#   docker compose logs -f postgres
# Parar e remover containers
#   docker compose down
# Resetar tudo (apaga banco e containers)
#   docker compose down -v

# Nota: A API no Docker já está configurada via env vars para conectar nos serviços.
# Se for rodar a API fora do Docker, use o profile 'local'.
#   setx SPRING_PROFILES_ACTIVE local
